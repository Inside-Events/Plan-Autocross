<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Circuit du Bouvreau — Plan interactif</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; font-family: 'Oswald', Arial, sans-serif; }
  #map { position: absolute; top: 0; bottom: 0; width: 100%; }

  .title-card {
    position: absolute; top: 12px; left: 12px; z-index: 5;
    background: rgba(15, 17, 21, 0.88); backdrop-filter: blur(6px);
    border-radius: 14px; padding: 10px 18px 10px 10px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35); max-width: 80vw;
  }
  .title-card img { height: 52px; width: auto; flex-shrink: 0; }
  .title-text h1 {
    font-family: 'Anton', sans-serif; font-size: 20px; letter-spacing: 0.04em;
    color: #ffffff; margin: 0; line-height: 1.05; text-transform: uppercase;
  }
  .title-text p {
    font-size: 11px; color: #c9ccd1; margin: 2px 0 0;
    letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
  }

  .legend-toggle {
    position: absolute; bottom: 24px; left: 12px; z-index: 6;
    background: rgba(15, 17, 21, 0.9); color: #fff; border: none;
    border-radius: 8px; padding: 6px 11px; font-family: 'Anton', sans-serif;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  }
  .legend {
    position: absolute; bottom: 24px; left: 12px; z-index: 5;
    background: rgba(15, 17, 21, 0.92); backdrop-filter: blur(6px);
    color: #fff; padding: 12px 14px; border-radius: 14px;
    max-height: 60vh; overflow-y: auto; max-width: 250px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35); display: none;
  }
  .legend.open { display: block; }
  .legend h3 {
    font-family: 'Anton', sans-serif; margin: 0 0 8px 0; font-size: 14px;
    letter-spacing: 0.12em; color: #ffd60a; text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
  }
  .legend h3 span.close { cursor: pointer; color: #999; font-size: 16px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; padding: 2px 4px; border-radius: 8px; }
  .legend-badge {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; border: 1.5px solid rgba(255,255,255,0.35);
  }
  .legend-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.2; }

  .mapboxgl-ctrl-top-right { top: 12px; right: 12px; }
  .mapboxgl-ctrl-top-right .mapboxgl-ctrl-group {
    background: rgba(15, 17, 21, 0.9); border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35); overflow: hidden;
  }
  .mapboxgl-ctrl-geolocate { width: 22px !important; height: 22px !important; }
  .mapboxgl-ctrl-icon { filter: invert(1) brightness(1.8); }

  .mapboxgl-popup-content {
    background: #ffffff; color: #1a1a1a; border-radius: 12px; padding: 14px 18px;
    font-family: 'Montserrat', sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    min-width: 150px; max-width: 230px;
  }
  .mapboxgl-popup-tip { border-top-color: #ffffff !important; border-bottom-color: #ffffff !important; }
  .mapboxgl-popup-close-button { color: #999; font-size: 16px; padding: 4px 8px; }
  .pu-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #111; }
  .pu-desc { font-size: 11px; color: #666; margin-top: 4px; line-height: 1.4; }

  .loading-screen {
    position: absolute; inset: 0; z-index: 50; background: #e8e4db;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    transition: opacity 0.4s ease;
  }
  .loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner { width: 40px; height: 40px; border-radius: 50%; border: 3px solid rgba(0,0,0,0.1); border-top-color: #E63946; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen p { font-family:'Anton',sans-serif; font-size: 13px; letter-spacing: 0.1em; color: #6b5530; text-transform: uppercase; }
</style>
</head>

const FAILED_ASSETS = [];

// Toutes les images sont embarquées en base64 dans ce fichier (data URI) : aucune requête
// réseau au chargement, donc aucun risque d'échec lié à GitHub raw, CORS, ou CSP.
function loadAllImages() {
  const promises = Object.entries(ASSET_DATA_URIS).map(([id, dataUri]) => {
    return new Promise((resolve) => {
      map.loadImage(dataUri, (error, image) => {
        if (error) {
          console.error('❌ Échec décodage embarqué pour', id, error);
          FAILED_ASSETS.push(id);
        } else if (!map.hasImage(id)) {
          map.addImage(id, image);
        }
        resolve();
      });
    });
  });
  return Promise.all(promises).then(() => {
    if (FAILED_ASSETS.length > 0) console.error('⚠️ Images non décodées:', FAILED_ASSETS);
    else console.log('✅ Toutes les images embarquées ont été chargées avec succès.');
  });
}

map.on('load', () => {
  // Masquer les calques natifs Mapbox qui transparaissent en arrière-plan :
  // routes, bâtiments, labels de villes, POI externes — on ne garde que le fond cartographique nu.
  const MAPBOX_HIDE_PATTERNS = [
    /^road/, /^bridge/, /^tunnel/, /^turning/,
    /^building/, /^poi/, /^place/, /^admin/,
    /^state/, /^country/, /^settlement/, /^motorway/,
    /^path/, /^pedestrian/, /^ferry/, /^aeroway/,
    /^transit/, /^rail/, /^label/, /^national/
  ];
  map.getStyle().layers.forEach(layer => {
    const id = layer.id.toLowerCase();
    if (MAPBOX_HIDE_PATTERNS.some(re => re.test(id))) {
      try { map.setLayoutProperty(layer.id, 'visibility', 'none'); } catch(e) {}
    }
  });

  loadAllImages().then(buildMap);
});

function buildMap() {

  LAYERS_TO_HIDE.forEach(id => { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none'); });
  if (map.getLayer('background')) map.setPaintProperty('background', 'background-color', '#e8e4db');
  if (map.getLayer('land')) map.setPaintProperty('land', 'fill-color', '#e8e4db');

  map.setFog({ 'range':[0.5,10], 'color':'#dfe9f2', 'high-color':'#a9c4dd', 'horizon-blend':0.15, 'space-color':'#0b1220', 'star-intensity':0.0 });

  // 1. FOND GLOBAL
  map.addSource('bg', { type:'geojson', data: bgData });
  // Fond en texture herbe foncée -- effet "carte posée dans un grand écrin de verdure naturelle"
  map.addLayer({ id:'bg-fill', type:'fill', source:'bg', paint:{ 'fill-pattern':'tex-herbe-foncee', 'fill-opacity':0.75 } });
  // Légère teinte kaki par-dessus pour unifier la saturation
  map.addLayer({ id:'bg-tint', type:'fill', source:'bg', paint:{ 'fill-color':'#6b7a4f', 'fill-opacity':0.15 } });

  // 2. NATURE -- mix textures herbe + feathering
  map.addSource('nature', { type:'geojson', data: natureData });
  map.addLayer({ id:'nature-feather', type:'line', source:'nature', paint:{ 'line-color':'#e8e4db','line-width':20,'line-blur':14,'line-opacity':0.5 } });
  map.addLayer({ id:'nature-fill', type:'fill', source:'nature', paint:{ 'fill-pattern': ['get','texture'], 'fill-opacity':0.85 } });
  // Teinte vert kaki/militaire semi-transparente par-dessus la texture -- casse la saturation,
  // donne l'unité visuelle "maquette papier" plutôt qu'un vert fluo numérique.
  map.addLayer({ id:'nature-tint', type:'fill', source:'nature', paint:{ 'fill-color':'#6b7a4f', 'fill-opacity':0.2 } });

  // 3. ZONE DE FOND DE COURSE
  if (zoneFondData) {
    map.addSource('zonefond', { type:'geojson', data: zoneFondData });
    map.addLayer({ id:'zonefond-fill', type:'fill', source:'zonefond', paint:{ 'fill-pattern':'tex-terrain-claire', 'fill-opacity':0.5 } });
  }

  // 4. COURS D'EAU -- texture-eau.jpg (anciennement "rivière")
  map.addSource('riviere', { type:'geojson', data: riviereData });
  map.addLayer({ id:'riviere-feather', type:'line', source:'riviere', paint:{ 'line-color':'#e8e4db','line-width':14,'line-blur':10,'line-opacity':0.4 } });
  map.addLayer({ id:'riviere-fill', type:'fill', source:'riviere', paint:{ 'fill-pattern':'tex-eau', 'fill-opacity':0.92 } });
  map.addLayer({ id:'riviere-outline', type:'line', source:'riviere', paint:{ 'line-color':'#ffffff','line-width':1,'line-opacity':0.5 } });

  // 5. PISTE + ombre + flèches
  map.addSource('circuit-glow', { type:'geojson', data:{ type:'FeatureCollection', features:[{type:'Feature',properties:{},geometry:{type:'Point',coordinates:[-1.3061552034015564, 46.92065717398822]}}] } });
  map.addLayer({ id:'circuit-glow-layer', type:'circle', source:'circuit-glow', paint:{ 'circle-radius':140,'circle-color':'#ffb347','circle-opacity':0.18,'circle-blur':1 } });

  map.addSource('track', { type:'geojson', data: trackData });
  map.addLayer({ id:'track-shadow', type:'line', source:'track', paint:{ 'line-color':'#111111','line-width':8,'line-opacity':0.2,'line-blur':6,'line-offset':4 } });
  map.addLayer({ id:'track-fill', type:'fill', source:'track', paint:{ 'fill-pattern':'tex-terrain-foncee', 'fill-opacity':1 } });
  map.addLayer({ id:'track-outline', type:'line', source:'track', paint:{ 'line-color':'#ffffff','line-width':1.5,'line-opacity':0.95 } });

  map.addSource('track-direction', { type:'geojson', data: trackDirData });
  map.addLayer({ id:'track-direction-arrows', type:'symbol', source:'track-direction',
    layout:{ 'symbol-placement':'line','symbol-spacing':120,'icon-image':'img-fleche','icon-size':0.04,
             'icon-rotation-alignment':'map','icon-allow-overlap':true,'icon-ignore-placement':true } });

  // 7. ZONE DE DEPART -- damier
  map.addSource('zonedepart', { type:'geojson', data: zoneDepartData });
  map.addLayer({ id:'zonedepart-fill', type:'fill', source:'zonedepart', paint:{ 'fill-pattern':'img-damier', 'fill-opacity':1 } });
  map.addLayer({ id:'zonedepart-outline', type:'line', source:'zonedepart', paint:{ 'line-color':'#ffffff','line-width':1.5,'line-opacity':0.9 } });

  // 8. ZONE ACTIVITE -- crème/sable doux + tente au centre
  map.addSource('zoneactivite', { type:'geojson', data: zoneActiviteData });
  map.addLayer({ id:'zoneactivite-fill', type:'fill', source:'zoneactivite', paint:{ 'fill-color':'#f4efe6', 'fill-opacity':0.9 } });
  map.addLayer({ id:'zoneactivite-outline', type:'line', source:'zoneactivite', paint:{ 'line-color':'#c9bfa3','line-width':1.5,'line-opacity':0.7 } });
  const zaCentroid = (() => {
    const ring = zoneActiviteData.geometry.coordinates[0];
    const n = ring.length;
    return [ring.reduce((s,p)=>s+p[0],0)/n, ring.reduce((s,p)=>s+p[1],0)/n];
  })();
  map.addSource('circus-point', { type:'geojson', data:{ type:'FeatureCollection', features:[{type:'Feature',properties:{},geometry:{type:'Point',coordinates:zaCentroid}}] } });
  map.addLayer({ id:'circus-icon', type:'symbol', source:'circus-point',
    layout:{ 'icon-image':'img-circus-tent','icon-size':0.18,'icon-allow-overlap':true,'icon-ignore-placement':true } });

  // 9. PADDOCK -- texture terrain clair (effet gravier), grille fine
  map.addSource('paddockpolys', { type:'geojson', data: paddockPolysData });
  map.addLayer({ id:'paddock-shadow', type:'line', source:'paddockpolys', paint:{ 'line-color':'#111111','line-width':8,'line-opacity':0.18,'line-blur':6,'line-offset':4 } });
  map.addLayer({ id:'paddock-fill', type:'fill', source:'paddockpolys', paint:{ 'fill-pattern':'tex-terrain-claire', 'fill-opacity':0.9 } });
  map.addLayer({ id:'paddock-grid', type:'line', source:'paddockpolys', paint:{ 'line-color':'#ffffff','line-width':1.2,'line-opacity':0.5 } });
  map.addLayer({ id:'paddock-click', type:'fill', source:'paddockpolys', paint:{ 'fill-color':'#000000','fill-opacity':0 } });

  // Lettres des allées (A, B, C... K) réaffichées au centre de chaque zone
  const paddockLettersLabels = {
    type: 'FeatureCollection',
    features: paddockPolysData.features.map(f => {
      const ring = f.geometry.coordinates[0];
      const n = ring.length;
      const c = [ring.reduce((s,p)=>s+p[0],0)/n, ring.reduce((s,p)=>s+p[1],0)/n];
      return { type:'Feature', properties:{ label: f.properties.label }, geometry:{ type:'Point', coordinates:c } };
    })
  };
  map.addSource('paddock-letters-pts', { type:'geojson', data: paddockLettersLabels });

  // Fond circulaire blanc semi-transparent sous chaque lettre pour lisibilité
  map.addLayer({
    id: 'paddock-letters-bg', type: 'circle', source: 'paddock-letters-pts',
    paint: { 'circle-radius': 10, 'circle-color': '#ffffff', 'circle-opacity': 0.7 }
  });

  map.addLayer({
    id: 'paddock-letters-text', type: 'symbol', source: 'paddock-letters-pts',
    layout: {
      'text-field': ['get','label'], 'text-size': 13,
      'text-font': ['Montserrat Bold','Open Sans Bold','Arial Unicode MS Bold'],
      'text-anchor': 'center', 'text-allow-overlap': true, 'text-ignore-placement': true
    },
    paint: { 'text-color':'#4a3b1f', 'text-halo-color':'#ffffff', 'text-halo-width':2, 'text-halo-blur':0 }
  });

  // 10. VILLAGE -- crème/sable doux #fdfbf7
  map.addSource('village', { type:'geojson', data: villageData });
  map.addLayer({ id:'village-shadow', type:'line', source:'village', paint:{ 'line-color':'#111111','line-width':8,'line-opacity':0.18,'line-blur':6,'line-offset':4 } });
  map.addLayer({ id:'village-fill', type:'fill', source:'village', paint:{ 'fill-pattern':'tex-herbe-claire', 'fill-opacity':0.75 } });
  map.addLayer({ id:'village-tint', type:'fill', source:'village', paint:{ 'fill-color':'#e8dfc8', 'fill-opacity':0.28 } });
  map.addLayer({ id:'village-outline', type:'line', source:'village', paint:{ 'line-color':'#c19e67','line-width':1.5,'line-opacity':0.9 } });

  // 11. ZONE SPECTATEURS
  map.addSource('spectateurs', { type:'geojson', data: spectateursData });
  map.addLayer({ id:'spectateurs-fill', type:'fill', source:'spectateurs', paint:{ 'fill-color':'#6fae6f', 'fill-opacity':0.3 } });
  map.addLayer({ id:'spectateurs-outline', type:'line', source:'spectateurs', paint:{ 'line-color':'#ffffff','line-width':1.2,'line-opacity':0.35 } });

  // 12. ZONES INTERDITES -- ultra-transparent + hachures bordeaux fines
  map.addSource('interdites', { type:'geojson', data: interditesData });
  map.addLayer({ id:'interdites-fill', type:'fill', source:'interdites', paint:{ 'fill-color':'#5c1f2e', 'fill-opacity':0.15 } });
  map.addLayer({ id:'interdites-hatch', type:'fill', source:'interdites', paint:{ 'fill-pattern':'pattern-hachures-interdit', 'fill-opacity':0.8 } });
  map.addLayer({ id:'interdites-outline', type:'line', source:'interdites', paint:{ 'line-color':'#5c1f2e','line-width':1.5,'line-opacity':0.7 } });

  const interditesLabels = {
    type: 'FeatureCollection',
    features: interditesData.features.map(f => {
      const ring = f.geometry.coordinates[0];
      const n = ring.length;
      const c = [ring.reduce((s,p)=>s+p[0],0)/n, ring.reduce((s,p)=>s+p[1],0)/n];
      return { type:'Feature', properties:{}, geometry:{ type:'Point', coordinates:c } };
    })
  };
  map.addSource('interdites-labels', { type:'geojson', data: interditesLabels });
  map.addLayer({
    id: 'interdites-label-text', type: 'symbol', source: 'interdites-labels',
    layout: {
      'text-field': 'ZONE INTERDITE', 'text-size': 10,
      'text-font': ['Montserrat Bold','Open Sans Bold','Arial Unicode MS Bold'],
      'text-letter-spacing': 0.05, 'text-anchor': 'center',
      'text-allow-overlap': true, 'text-ignore-placement': true, 'text-max-width': 7
    },
    paint: { 'text-color':'#ffffff', 'text-halo-color':'#5c1f2e', 'text-halo-width':3, 'text-halo-blur':0 }
  });

  // 13. PARKINGS -- texture herbe foncée, contour coloré conservé pour distinction
  map.addSource('parkings', { type:'geojson', data: parkingsData });
  map.addLayer({ id:'parkings-fill', type:'fill', source:'parkings', paint:{ 'fill-pattern':'tex-herbe-foncee', 'fill-opacity':0.3 } });
  map.addLayer({ id:'parkings-tint', type:'fill', source:'parkings', paint:{ 'fill-color':'#e8e4db', 'fill-opacity':0.35 } });

  // Différenciation des parkings par bordure (pas de couleur de fond agressive) :
  // Officiel -> pointillé blanc / Commissaires -> ligne jaune-orange / Bénévoles-Partenaires -> ligne bleue
  map.addLayer({
    id: 'parkings-outline-officiel', type: 'line', source: 'parkings',
    filter: ['==', ['get','label'], 'Parking Officiel'],
    paint: { 'line-color': '#ffffff', 'line-width': 1.8, 'line-dasharray': [1.5, 1.5], 'line-opacity': 0.95 }
  });
  map.addLayer({
    id: 'parkings-outline-commissaires', type: 'line', source: 'parkings',
    filter: ['==', ['get','label'], 'Parking Commissaires'],
    paint: { 'line-color': '#ff9f43', 'line-width': 1.5, 'line-opacity': 0.9 }
  });
  map.addLayer({
    id: 'parkings-outline-benevoles', type: 'line', source: 'parkings',
    filter: ['==', ['get','label'], 'Parking Bénévoles & Partenaires'],
    paint: { 'line-color': '#54a0ff', 'line-width': 1.5, 'line-opacity': 0.9 }
  });
  // Zone Camping-car : vert pelouse lumineux #a5be9b distinct des parkings génériques
  map.addLayer({ id:'camping-fill-overlay', type:'fill', source:'parkings',
    filter:['==', ['get','label'], 'Camping-car & Camping'],
    paint:{ 'fill-color':'#a5be9b', 'fill-opacity':0.65 } });

  // Contour blanc fin uniforme sur tous les parkings
  map.addLayer({
    id: 'parkings-outline-default', type: 'line', source: 'parkings',
    filter: ['!', ['in', ['get','label'], ['literal', ['Parking Officiel','Parking Commissaires','Parking Bénévoles & Partenaires']]]],
    paint: { 'line-color': '#ffffff', 'line-width': 1.2, 'line-opacity': 0.35 }
  });


  // ARBRES -- après les zones de fond, avant les icônes de service
  map.addSource('arbres', { type:'geojson', data: arbresData });
  map.addLayer({ id:'arbres-circles', type:'symbol', source:'arbres',
    layout:{
      'icon-image': 'ico-tree',
      'icon-size': ['interpolate', ['linear'], ['zoom'], 14, 0.4, 17, 0.6],
      'icon-allow-overlap': true, 'icon-ignore-placement': true
    } });

  // 14. ZONES GENERALES (fill discret derrière les icônes de service)
  map.addSource('general', { type:'geojson', data: generalData });
  map.addLayer({ id:'general-fill', type:'fill', source:'general', paint:{ 'fill-color': ['get','color'], 'fill-opacity':0.18 } });
  map.addLayer({ id:'general-outline', type:'line', source:'general', paint:{ 'line-color':'#ffffff','line-width':1.2,'line-opacity':0.35 } });

  // 15. CHEMIN PIETON -- ligne sable fine pointillée
  if (cheminData) {
    map.addSource('chemin', { type:'geojson', data: cheminData });
    map.addLayer({ id:'chemin-line', type:'line', source:'chemin', paint:{ 'line-color':'#dfb13a','line-width':5,'line-dasharray':[3,2],'line-opacity':0.95 } });
  }
  map.addSource('traceblanc', { type:'geojson', data: traceBlancData });
  map.addLayer({ id:'traceblanc-line', type:'line', source:'traceblanc', paint:{ 'line-color':'#ffffff','line-width':2.5,'line-dasharray':[1,1.5],'line-opacity':0.85 } });

  // ============================================================
  // 16. BADGES TEXTE -- text-halo pur (jamais de désynchronisation avec le zoom,
  // contrairement à un rectangle géométrique qui se déforme par rapport au texte).
  // Les points jaunes/roses source ne sont JAMAIS dessinés (aucun circle-layer associé).
  // ============================================================
  map.addSource('texte-badges', { type:'geojson', data: texteBadgesData });
  map.addLayer({
    id: 'texte-badges-text', type: 'symbol', source: 'texte-badges',
    layout: {
      'text-field': ['upcase', ['get','label']],
      'text-size': 12,
      'text-font': ['Montserrat Bold','Open Sans Bold','Arial Unicode MS Bold'],
      'text-letter-spacing': 0.08,
      'text-anchor': 'center',
      'text-pitch-alignment': 'viewport',
      'text-rotation-alignment': 'viewport',
      'text-allow-overlap': true,
      'text-ignore-placement': true,
      'text-max-width': 14
    },
    paint: {
      'text-color': '#ffffff',
      'text-halo-color': '#1a1a1a',
      'text-halo-width': 5,
      'text-halo-blur': 0
    }
  });

  // -- Badges horaires : même technique, fond clair / texte sombre, italique, saut de ligne sur "/" --
  // Couleurs par badge : Village=bordeaux, Entrée Public=orange, Cashless=bleu (plan officiel)
  const HORAIRE_COLORS = [
    { key: 'Village',   bg: '#8B1E3F', text: '#ffffff' },
    { key: 'Entree',    bg: '#E65F2B', text: '#ffffff' },
    { key: 'Cashless',  bg: '#1A6BAE', text: '#ffffff' },
  ];
  const badgesHorairesProcessed = {
    type: 'FeatureCollection',
    features: badgesHorairesData.features.map((f, i) => {
      const lines = f.properties.label.split('/').map(s => s.trim());
      const col = HORAIRE_COLORS[i] || { bg: '#1a1a1a', text: '#ffffff' };
      return { ...f, properties: { ...f.properties, label: lines.join('\n'), bgColor: col.bg, textColor: col.text } };
    })
  };
  map.addSource('badges-horaires', { type:'geojson', data: badgesHorairesProcessed });
  map.addLayer({
    id: 'badges-horaires-text', type: 'symbol', source: 'badges-horaires',
    layout: {
      'text-field': ['get','label'],
      'text-size': 11,
      'text-font': ['Montserrat Italic','Open Sans Italic','Arial Unicode MS Regular'],
      'text-anchor': 'center',
      'text-justify': 'left',
      'text-line-height': 1.3,
      'text-pitch-alignment': 'viewport',
      'text-rotation-alignment': 'viewport',
      'text-allow-overlap': true,
      'text-ignore-placement': true,
      'text-max-width': 16
    },
    paint: {
      'text-color': ['get', 'textColor'],
      'text-halo-color': ['get', 'bgColor'],
      'text-halo-width': 5,
      'text-halo-blur': 0
    }
  });

  // ============================================================
  // 17. ICONES DE SERVICE -- couche symbol UNIQUE basée sur "category", sans aucun circle-layer
  // ============================================================
  const CATEGORY_TO_ICON = {
    'restaurant':'ico-restaurant','binoculars':'ico-binoculars','bar':'ico-bar','bakery':'ico-bakery',
    'exctincteur':'ico-exctincteur','french-fries':'ico-french-fries','ticket':'ico-ticket',
    'wc':'ico-wc','vip':'ico-vip','wheelchair':'ico-wheelchair','pharmacie':'ico-pharmacie',
    'circus-tent':'img-circus-tent',
    'burger':'ico-burger',
    'trophy':'ico-trophy',
    'camping-car':'ico-camping-car'
  };
  const MAPPED_CATEGORIES = Object.keys(CATEGORY_TO_ICON);

  map.addSource('pois', { type:'geojson', data: pointsData });

  // Halo retiré (cause des disques colorés vides observés en v18) : icon-halo-* nécessite des images
  // au format SDF, incompatible avec des PNG standards. Pas d'alternative fiable sans cercle parasite,
  // donc on affiche l'icône brute sans halo plutôt que de risquer un artefact visuel.

  // --- Macaron fiable : cercle blanc opaque (taille toujours stable en pixels, contrairement à
  // icon-size qui devient imprévisible combiné au pitch 3D) + icône PNG dessinée par-dessus.
  map.addLayer({
    id: 'poi-macaron-bg', type: 'circle', source: 'pois',
    filter: ['in', ['get','category'], ['literal', MAPPED_CATEGORIES]],
    paint: {
      'circle-radius': 16,
      'circle-color': '#ffffff',
      'circle-opacity': 1,
      'circle-stroke-color': ['get','color'],
      'circle-stroke-width': 2.5
    }
  });

  map.addLayer({
    id: 'poi-icon-service', type: 'symbol', source: 'pois',
    filter: ['in', ['get','category'], ['literal', MAPPED_CATEGORIES]],
    layout: {
      'icon-image': ['match', ['get','category'],
        'restaurant','ico-restaurant','binoculars','ico-binoculars','bar','ico-bar','bakery','ico-bakery',
        'exctincteur','ico-exctincteur','french-fries','ico-french-fries','ticket','ico-ticket',
        'wc','ico-wc','vip','ico-vip','wheelchair','ico-wheelchair','pharmacie','ico-pharmacie',
        'circus-tent','img-circus-tent',
        'burger','ico-burger',
        'trophy','ico-trophy',
        'camping-car','ico-camping-car',
        'ico-wc'
      ],
      'icon-size': ['interpolate', ['linear'], ['zoom'], 14, 0.12, 16, 0.20, 17.5, 0.28],
      'icon-allow-overlap': true,
      'icon-ignore-placement': true
    }
  });

  // Macarons fallback supprimés sur demande : les badges textuels (PARKING COMMISSAIRES etc.)
  // suffisent à identifier ces zones sans doublon visuel.

  // ============================================================
  // ── INTERACTIVITÉ : curseur pointer + flyTo + popup blanc sobre ──
  function openPopup(coords, label, desc) {
    const descHtml = desc ? `<div class="pu-desc">${desc}</div>` : '';
    new mapboxgl.Popup({ offset: 14, closeButton: true })
      .setLngLat(coords)
      .setHTML(`<div class="pu-title">${label}</div>${descHtml}`)
      .addTo(map);
  }
  function flyAndPopup(coords, label, desc) {
    map.flyTo({ center: coords, zoom: Math.max(map.getZoom(), 17), duration: 700, essential: true });
    setTimeout(() => openPopup(coords, label, desc), 420);
  }

  // Clic icônes de service
  map.on('click', 'poi-icon-service', e => {
    const p = e.features[0].properties;
    flyAndPopup(e.features[0].geometry.coordinates, p.label || p.group, p.desc);
  });
  map.on('click', 'poi-macaron-bg', e => {
    const p = e.features[0].properties;
    flyAndPopup(e.features[0].geometry.coordinates, p.label || p.group, p.desc);
  });

  // Clic zones principales
  ['paddock-click','village-fill','parkings-fill','spectateurs-fill',
   'general-fill','camping-fill-overlay'].forEach(id => {
    map.on('click', id, e => {
      const p = e.features[0].properties;
      openPopup(e.lngLat.toArray(),
        p.label || p.group || 'Zone',
        p.desc || (p.restricted ? 'Accès restreint' : ''));
    });
  });

  // Curseur pointer au survol
  const HOVERABLE = ['poi-icon-service','poi-macaron-bg','paddock-click',
    'village-fill','parkings-fill','spectateurs-fill','general-fill','camping-fill-overlay'];
  HOVERABLE.forEach(id => {
    map.on('mouseenter', id, () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', id, () => { map.getCanvas().style.cursor = ''; });
  });
  // ============================================================

  // ============================================================
  // LEGENDE
  // ============================================================
  const seen = new Set();
  const legendContainer = document.getElementById('legend-items');
  function addLegend(color, icon, label) {
    if (seen.has(label)) return;
    seen.add(label);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-badge" style="background:${color}">${icon||''}</span><span class="legend-label">${label}</span>`;
    legendContainer.appendChild(item);
  }
  addLegend('#5C4033','🏁','Piste de course');
  addLegend('#EAE7DC','','Paddock (Zones A-K)');
  addLegend('#fdfbf7','','Village / Espace Animation');
  addLegend('#6fae6f','','Zone Spectateurs');
  addLegend('#5c1f2e','🚫','Zone interdite');
  parkingsData.features.forEach(f => addLegend(f.properties.color, f.properties.icon, f.properties.group));
  generalData.features.forEach(f => addLegend(f.properties.color, f.properties.icon, f.properties.group));

  document.getElementById('loadingScreen').classList.add('hidden');

} // fin buildMap()
</script>

</body>
</html>
