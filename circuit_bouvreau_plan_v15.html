<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Circuit du Bouvreau — Plan interactif</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; font-family: 'Oswald', Arial, sans-serif; }
  #map { position: absolute; top: 0; bottom: 0; width: 100%; }

  .title-card {
    position: absolute; top: 12px; left: 12px; z-index: 5;
    background: rgba(15, 17, 21, 0.88); backdrop-filter: blur(6px);
    border-radius: 14px; padding: 10px 18px 10px 10px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35); max-width: 80vw;
  }
  .title-card img { height: 52px; width: auto; flex-shrink: 0; }
  .title-text h1 {
    font-family: 'Anton', sans-serif; font-size: 20px; letter-spacing: 0.04em;
    color: #ffffff; margin: 0; line-height: 1.05; text-transform: uppercase;
  }
  .title-text p {
    font-size: 11px; color: #c9ccd1; margin: 2px 0 0;
    letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
  }

  .legend-toggle {
    position: absolute; bottom: 24px; left: 12px; z-index: 6;
    background: rgba(15, 17, 21, 0.9); color: #fff; border: none;
    border-radius: 8px; padding: 6px 11px; font-family: 'Anton', sans-serif;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  }
  .legend {
    position: absolute; bottom: 24px; left: 12px; z-index: 5;
    background: rgba(15, 17, 21, 0.92); backdrop-filter: blur(6px);
    color: #fff; padding: 12px 14px; border-radius: 14px;
    max-height: 60vh; overflow-y: auto; max-width: 250px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35); display: none;
  }
  .legend.open { display: block; }
  .legend h3 {
    font-family: 'Anton', sans-serif; margin: 0 0 8px 0; font-size: 14px;
    letter-spacing: 0.12em; color: #ffd60a; text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
  }
  .legend h3 span.close { cursor: pointer; color: #999; font-size: 16px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; padding: 2px 4px; border-radius: 8px; }
  .legend-badge {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; border: 1.5px solid rgba(255,255,255,0.35);
  }
  .legend-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.2; }

  .mapboxgl-ctrl-top-right { top: 12px; right: 12px; }
  .mapboxgl-ctrl-top-right .mapboxgl-ctrl-group {
    background: rgba(15, 17, 21, 0.9);
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    overflow: hidden;
  }
  .mapboxgl-ctrl-geolocate { width: 22px !important; height: 22px !important; }
  .mapboxgl-ctrl-icon { filter: invert(1) brightness(1.8); }

  .mapboxgl-popup-content {
    background: #14161a; color: #fff; border-radius: 16px; padding: 12px 18px;
    font-family: 'Oswald', sans-serif; box-shadow: 0 8px 28px rgba(0,0,0,0.45);
  }
  .mapboxgl-popup-tip { border-top-color: #14161a !important; border-bottom-color: #14161a !important; }
  .popup-title {
    font-family: 'Anton', sans-serif; font-size: 14px; letter-spacing: 0.06em;
    text-transform: uppercase; display: flex; align-items: center; gap: 8px; font-weight: 700;
  }
  .popup-icon { font-size: 20px; }
  .popup-desc { font-size: 11px; color: #b8bcc4; margin-top: 4px; font-weight: 400; text-transform: none; letter-spacing: normal; }

  .loading-screen {
    position: absolute; inset: 0; z-index: 50;
    background: #e8e4db;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    transition: opacity 0.4s ease;
  }
  .loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid rgba(0,0,0,0.1); border-top-color: #E63946;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen p { font-family:'Anton',sans-serif; font-size: 13px; letter-spacing: 0.1em; color: #6b5530; text-transform: uppercase; }
</style>
</head>

function loadImageWithFallback(id, candidates) {
  return new Promise((resolve) => {
    let i = 0;
    function tryNext() {
      if (i >= candidates.length) {
        console.warn('Aucune variante trouvée pour', id);
        resolve();
        return;
      }
      const url = ASSET_BASE + candidates[i];
      i++;
      map.loadImage(url, (error, image) => {
        if (error) {
          tryNext();
        } else {
          if (!map.hasImage(id)) map.addImage(id, image);
          resolve();
        }
      });
    }
    tryNext();
  });
}

function loadHachuresPattern() {
  return new Promise((resolve) => {
    map.loadImage('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAYAAACNiR0NAAAABmJLR0QA/wD/AP+gvaeTAAAAr0lEQVQ4ja3UXQqCQBiF4XeYcQm1Ab0QLFxCiNvO9hA0JIT30hY+oW4siPyZGecs4IFz8yqb53e0rgprewJ3TdN9kiQNcDCDyKls22cMDLipUAjgkWU7MaYBji9o0boKBqewwto+CJzDALzBJcwbXMO8QBfMGXTFnEAfbBX0xRbBEGwWDMUmwS3YH7gV+wFjYF8wFgagYmIARoy5MMZxEKm3xtZ8MBGpy64Lxsan5zfsRaFjpAnIDwAAAABJRU5ErkJggg==', (error, image) => {
      if (!error && !map.hasImage('pattern-hachures')) map.addImage('pattern-hachures', image);
      resolve();
    });
  });
}

function loadAllImages() {
  const promises = Object.entries(ASSET_CANDIDATES).map(([id, candidates]) => loadImageWithFallback(id, candidates));
  promises.push(loadHachuresPattern());
  return Promise.all(promises);
}

function showPopup(coords, props) {
  const icon = props.icon ? `<span class="popup-icon">${props.icon}</span>` : '';
  let desc = props.desc ? `<div class="popup-desc">${props.desc}</div>` : '';
  if (props.restricted) desc += `<div class="popup-desc" style="color:#ff6b6b;font-weight:600;">[ ACCÈS RESTREINT ]</div>`;
  new mapboxgl.Popup()
    .setLngLat(coords)
    .setHTML(`<div class="popup-title">${icon}${props.label}</div>${desc}`)
    .addTo(map);
}

function flyAndPopup(coords, props) {
  map.flyTo({ center: coords, zoom: Math.max(map.getZoom(), 17.5), duration: 900, essential: true });
  setTimeout(() => showPopup(coords, props), 350);
}

const badgesHorairesData = {"type": "FeatureCollection", "features": [{"type": "Feature", "properties": {"label": "Vendredi 17h - 1h / Samedi : 6h - 20h / Dimanche : 6h - 20h"}, "geometry": {"type": "Point", "coordinates": [-1.310272, 46.918055]}}, {"type": "Feature", "properties": {"label": "Samedi : 8h - 17h / Dimanche 7h - 17h"}, "geometry": {"type": "Point", "coordinates": [-1.308471, 46.917493]}}, {"type": "Feature", "properties": {"label": "Vendredi 17h - 00h (uniquement au village) / Samedi : 8h - 00h / Dimanche : 8h - 18h "}, "geometry": {"type": "Point", "coordinates": [-1.30588, 46.916919]}}]};

map.on('load', () => {
  loadAllImages().then(buildMap);
});

function buildMap() {

  LAYERS_TO_HIDE.forEach(id => { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none'); });
  if (map.getLayer('background')) map.setPaintProperty('background', 'background-color', '#e8e4db');
  if (map.getLayer('land')) map.setPaintProperty('land', 'fill-color', '#e8e4db');

  map.setFog({
    'range': [0.5, 10], 'color': '#dfe9f2', 'high-color': '#a9c4dd',
    'horizon-blend': 0.15, 'space-color': '#0b1220', 'star-intensity': 0.0
  });

  // ============================================================
  // 1. FOND GLOBAL
  // ============================================================
  map.addSource('bg', { type:'geojson', data: bgData });
  map.addLayer({ id:'bg-fill', type:'fill', source:'bg', paint:{ 'fill-color': ['get','color'], 'fill-opacity': ['get','opacity'] } });

  // ============================================================
  // 2. NATURE -- mix de textures herbe claire/foncée + feathering
  // ============================================================
  map.addSource('nature', { type:'geojson', data: natureData });
  map.addLayer({
    id: 'nature-feather', type:'line', source:'nature',
    paint:{ 'line-color':'#e8e4db', 'line-width':20, 'line-blur':14, 'line-opacity':0.5 }
  });
  map.addLayer({
    id:'nature-fill', type:'fill', source:'nature',
    paint:{ 'fill-pattern': ['get','texture'], 'fill-opacity':0.85 }
  });

  // ============================================================
  // 3. ZONE DE FOND DE COURSE -- texture terrain
  // ============================================================
  if (zoneFondData) {
    map.addSource('zonefond', { type:'geojson', data: zoneFondData });
    map.addLayer({ id:'zonefond-fill', type:'fill', source:'zonefond', paint:{ 'fill-pattern':'tex-terrain-claire', 'fill-opacity':0.5 } });
  }

  // ============================================================
  // 4. RIVIERE -- texture eau
  // ============================================================
  map.addSource('riviere', { type:'geojson', data: riviereData });
  map.addLayer({ id:'riviere-feather', type:'line', source:'riviere',
    paint:{ 'line-color':'#e8e4db', 'line-width':14, 'line-blur':10, 'line-opacity':0.4 } });
  map.addLayer({ id:'riviere-fill', type:'fill', source:'riviere', paint:{ 'fill-pattern':'tex-eau', 'fill-opacity':0.92 } });
  map.addLayer({ id:'riviere-outline', type:'line', source:'riviere', paint:{ 'line-color':'#ffffff', 'line-width':1, 'line-opacity':0.5 } });

  // ============================================================
  // 5. PISTE + ombre + flèches de direction
  // ============================================================
  map.addSource('circuit-glow', { type:'geojson', data:{ type:'FeatureCollection', features:[{type:'Feature',properties:{},geometry:{type:'Point',coordinates: [-1.3061552034015564, 46.92065717398822]}}] } });
  map.addLayer({ id:'circuit-glow-layer', type:'circle', source:'circuit-glow',
    paint:{ 'circle-radius':140, 'circle-color':'#ffb347', 'circle-opacity':0.18, 'circle-blur':1 } });

  map.addSource('track', { type:'geojson', data: trackData });
  map.addLayer({ id:'track-shadow', type:'line', source:'track',
    paint:{ 'line-color':'#111111', 'line-width':8, 'line-opacity':0.2, 'line-blur':6, 'line-offset':4 } });
  map.addLayer({ id:'track-fill', type:'fill', source:'track', paint:{ 'fill-pattern':'tex-terrain-foncee', 'fill-opacity':1 } });
  map.addLayer({ id:'track-outline', type:'line', source:'track', paint:{ 'line-color':'#ffffff', 'line-width':1.5, 'line-opacity':0.95 } });

  map.addSource('track-direction', { type:'geojson', data: trackDirData });
  map.addLayer({
    id:'track-direction-arrows', type:'symbol', source:'track-direction',
    layout:{ 'symbol-placement':'line', 'symbol-spacing':120, 'icon-image':'img-fleche', 'icon-size':0.04,
             'icon-rotation-alignment':'map', 'icon-allow-overlap':true }
  });

  // ============================================================
  // 6. ARBRES -- 100 points déjà placés, taille aléatoire, superposition libre
  // ============================================================
  map.addSource('arbres', { type:'geojson', data: arbresData });
  map.addLayer({
    id:'arbres-circles', type:'circle', source:'arbres',
    paint:{ 'circle-radius':4, 'circle-color':'#2d4a22', 'circle-opacity':0.6 }
  });

  // ============================================================
  // 7. ZONE DE DEPART -- damier
  // ============================================================
  map.addSource('zonedepart', { type:'geojson', data: zoneDepartData });
  map.addLayer({ id:'zonedepart-fill', type:'fill', source:'zonedepart', paint:{ 'fill-pattern':'img-damier', 'fill-opacity':1 } });
  map.addLayer({ id:'zonedepart-outline', type:'line', source:'zonedepart', paint:{ 'line-color':'#ffffff', 'line-width':1.5, 'line-opacity':0.9 } });

  // ============================================================
  // 8. ZONE ACTIVITE -- esprit festival/carnaval + tente au centre
  // ============================================================
  map.addSource('zoneactivite', { type:'geojson', data: zoneActiviteData });
  map.addLayer({ id:'zoneactivite-fill', type:'fill', source:'zoneactivite',
    paint:{ 'fill-color':'#f4efe6', 'fill-opacity':0.9 } });
  map.addLayer({ id:'zoneactivite-outline', type:'line', source:'zoneactivite',
    paint:{ 'line-color':'#c9bfa3', 'line-width':1.5, 'line-opacity':0.7 } });

  const zaCentroid = (() => {
    const ring = zoneActiviteData.geometry.coordinates[0];
    const n = ring.length;
    return [ring.reduce((s,p)=>s+p[0],0)/n, ring.reduce((s,p)=>s+p[1],0)/n];
  })();
  map.addSource('circus-point', { type:'geojson', data:{ type:'FeatureCollection', features:[{type:'Feature',properties:{},geometry:{type:'Point',coordinates:zaCentroid}}] } });
  map.addLayer({
    id:'circus-icon', type:'symbol', source:'circus-point',
    layout:{ 'icon-image':'img-circus-tent', 'icon-size':0.18, 'icon-allow-overlap':true,
             'icon-pitch-alignment':'viewport', 'icon-rotation-alignment':'viewport' }
  });

  // ============================================================
  // 9. PADDOCK -- fond + grille technique (lettres masquées)
  // ============================================================
  map.addSource('paddockpolys', { type:'geojson', data: paddockPolysData });
  map.addLayer({ id:'paddock-shadow', type:'line', source:'paddockpolys',
    paint:{ 'line-color':'#111111', 'line-width':8, 'line-opacity':0.18, 'line-blur':6, 'line-offset':4 } });
  map.addLayer({ id:'paddock-fill', type:'fill', source:'paddockpolys', paint:{ 'fill-color':'#EAE7DC', 'fill-opacity':1 } });
  map.addLayer({ id:'paddock-grid', type:'line', source:'paddockpolys', paint:{ 'line-color':'#ffffff', 'line-width':1.2, 'line-opacity':0.5 } });
  map.addLayer({ id:'paddock-click', type:'fill', source:'paddockpolys', paint:{ 'fill-color':'#000000', 'fill-opacity':0 } });

  map.addSource('paddocklabels', { type:'geojson', data: paddockLabelData });
  map.addLayer({
    id:'paddock-letters-text', type:'symbol', source:'paddocklabels',
    layout:{ 'text-field': ['get','label'], 'text-size':12, 'text-font':['Montserrat Bold','Open Sans Bold','Arial Unicode MS Bold'],
             'text-anchor':'center', 'text-pitch-alignment':'viewport', 'text-rotation-alignment':'viewport',
             'text-allow-overlap': false, 'visibility':'none' },
    paint:{ 'text-color':'#4a3b1f', 'text-halo-color':'#FFFFFF', 'text-halo-width':1.5 }
  });

  map.addSource('paddocktitle', { type:'geojson', data:{ type:'FeatureCollection', features:[{type:'Feature',properties:{label:'PADDOCK'},geometry:{type:'Point',coordinates:paddockTitlePos}}] } });
  // Désactivé : doublon avec le badge "PADDOCK" du système texte-badge (point jaune positionné par Paul).
  map.addLayer({
    id:'paddock-title', type:'symbol', source:'paddocktitle',
    layout:{ 'text-field': ['get','label'], 'text-size': ['interpolate',['linear'],['zoom'],15,13,18,18],
             'text-font':['Montserrat Bold','Open Sans Bold','Arial Unicode MS Bold'], 'text-anchor':'center',
             'text-pitch-alignment':'viewport', 'text-rotation-alignment':'viewport', 'text-allow-overlap':true,
             'text-letter-spacing':0.1, 'visibility':'none' },
    paint:{ 'text-color':'#ffffff', 'text-halo-color':'#1a1a1a', 'text-halo-width':5, 'text-halo-blur':0 }
  });

  // ============================================================
  // 10. VILLAGE / SPECTATEURS / INTERDITES / PARKINGS / GENERAL -- couleurs douces
  // ============================================================
  map.addSource('village', { type:'geojson', data: villageData });
  map.addLayer({ id:'village-shadow', type:'line', source:'village',
    paint:{ 'line-color':'#111111', 'line-width':8, 'line-opacity':0.18, 'line-blur':6, 'line-offset':4 } });
  map.addLayer({ id:'village-fill', type:'fill', source:'village', paint:{ 'fill-color': ['get','color'], 'fill-opacity': ['get','opacity'] } });
  map.addLayer({ id:'village-outline', type:'line', source:'village', paint:{ 'line-color': ['get','border'], 'line-width':2, 'line-opacity':0.9 } });

  map.addSource('spectateurs', { type:'geojson', data: spectateursData });
  map.addLayer({ id:'spectateurs-fill', type:'fill', source:'spectateurs', paint:{ 'fill-color': ['get','color'], 'fill-opacity': ['get','opacity'] } });
  map.addLayer({ id:'spectateurs-outline', type:'line', source:'spectateurs', paint:{ 'line-color': ['get','border'], 'line-width':2, 'line-opacity':0.9 } });

  map.addSource('interdites', { type:'geojson', data: interditesData });
  map.addLayer({ id:'interdites-fill', type:'fill', source:'interdites', paint:{ 'fill-pattern':'pattern-hachures', 'fill-opacity':0.32 } });
  map.addLayer({ id:'interdites-outline', type:'line', source:'interdites', paint:{ 'line-color':'#d62828', 'line-width':2, 'line-opacity':0.85 } });

  map.addSource('parkings', { type:'geojson', data: parkingsData });
  map.addLayer({ id:'parkings-fill', type:'fill', source:'parkings', paint:{ 'fill-color': ['get','color'], 'fill-opacity': 0.2 } });
  map.addLayer({ id:'parkings-outline', type:'line', source:'parkings', paint:{ 'line-color': ['get','border'], 'line-width':1.5, 'line-opacity':0.6 } });

  map.addSource('general', { type:'geojson', data: generalData });
  map.addLayer({ id:'general-fill', type:'fill', source:'general', paint:{ 'fill-color': ['get','color'], 'fill-opacity': ['get','opacity'] } });
  map.addLayer({ id:'general-outline', type:'line', source:'general', paint:{ 'line-color': ['get','color'], 'line-width':2, 'line-opacity':1 } });

  if (cheminData) {
    map.addSource('chemin', { type:'geojson', data: cheminData });
    map.addLayer({ id:'chemin-line', type:'line', source:'chemin', paint:{ 'line-color': ['get','color'], 'line-width':2, 'line-dasharray':[2,2], 'line-opacity':0.9 } });
  }
  map.addSource('traceblanc', { type:'geojson', data: traceBlancData });
  map.addLayer({ id:'traceblanc-line', type:'line', source:'traceblanc', paint:{ 'line-color':'#ffffff', 'line-width':2.5, 'line-dasharray':[1,1.5], 'line-opacity':0.85 } });

  // ============================================================
  // 11. GRANDS TITRES -- Montserrat fin, halo diffus, padding, anti-overlap
  // ============================================================
  map.addSource('biglabels', { type:'geojson', data: bigLabelsData });
  // Remplacé par le système de badges précis (texte-badges) positionnés manuellement par Paul.
  // Calque conservé mais désactivé pour éviter tout doublon visuel -- réactivable en 1 ligne si besoin.
  map.addLayer({
    id:'biglabels-text', type:'symbol', source:'biglabels',
    layout:{
      'text-field': ['upcase', ['get','label']], 'text-size': ['interpolate',['linear'],['zoom'],15,11,18,16],
      'text-font':['Montserrat Bold','Open Sans Bold','Arial Unicode MS Bold'], 'text-letter-spacing':0.06,
      'text-variable-anchor': ['top','bottom','left','right'], 'text-radial-offset':0.6, 'text-justify':'auto',
      'text-padding':24, 'text-pitch-alignment':'viewport', 'text-rotation-alignment':'viewport',
      'text-allow-overlap': false, 'text-max-width':8,
      'visibility': 'none'
    },
    paint:{
      'text-color':'#ffffff',
      'text-halo-color':'#1a1a1a',
      'text-halo-width':5,
      'text-halo-blur':0
    }
  });
  map.addLayer({
    id:'biglabels-restricted', type:'symbol', source:'biglabels',
    filter:['==',['get','restricted'],true],
    layout:{ 'text-field':'[ ACCÈS RESTREINT ]', 'text-size':8.5,
             'text-font':['Montserrat Bold','Open Sans Bold','Arial Unicode MS Bold'], 'text-anchor':'top',
             'text-offset':[0,1.4], 'text-padding':18, 'text-pitch-alignment':'viewport',
             'text-rotation-alignment':'viewport', 'text-allow-overlap': false },
    paint:{ 'text-color':'#ff6b6b', 'text-halo-color':'#1a1a1a', 'text-halo-width':4, 'text-halo-blur':0 }
  });

  // ============================================================
  // 11bis. BADGES TEXTE -- ancrés sur points dédiés du GeoJSON (jaune = lieux, rose = horaires)
  // Les points sources eux-mêmes ne sont jamais dessinés (pas de circle-layer associé).
  // ============================================================

  // -- texte-badge : noms de lieux, badge sombre net, texte blanc MAJUSCULES --
  map.addSource('texte-badges', { type:'geojson', data: texteBadgesData });
  map.addLayer({
    id: 'texte-badges-text', type: 'symbol', source: 'texte-badges',
    layout: {
      'text-field': ['upcase', ['get','label']],
      'text-size': 13,
      'text-font': ['Montserrat Bold','Open Sans Bold','Arial Unicode MS Bold'],
      'text-anchor': 'center',
      'text-pitch-alignment': 'viewport',
      'text-rotation-alignment': 'viewport',
      'text-allow-overlap': true,
      'text-max-width': 9
    },
    paint: {
      'text-color': '#ffffff',
      'text-halo-color': '#1a1a1a',
      'text-halo-width': 5,
      'text-halo-blur': 0
    }
  });

  // -- texte-badge-horaires : badge distinct, plus petit, italique, gestion du "/" en retour à la ligne --
  // Pré-traitement JS : on transforme chaque "label" contenant des "/" en plusieurs lignes
  // (un horaire par ligne, ex: "Vendredi 17h - 1h" / "Samedi : 6h - 20h" / "Dimanche : 6h - 20h")
  const badgesHorairesProcessed = {
    type: 'FeatureCollection',
    features: badgesHorairesData.features.map(f => {
      const lines = f.properties.label.split('/').map(s => s.trim());
      return {
        ...f,
        properties: { ...f.properties, label: lines.join('\n') }
      };
    })
  };

  map.addSource('badges-horaires', { type:'geojson', data: badgesHorairesProcessed });
  map.addLayer({
    id: 'badges-horaires-text', type: 'symbol', source: 'badges-horaires',
    layout: {
      'text-field': ['get','label'],
      'text-size': 11,
      'text-font': ['Montserrat Italic','Open Sans Italic','Arial Unicode MS Regular'],
      'text-anchor': 'center',
      'text-line-height': 1.3,
      'text-pitch-alignment': 'viewport',
      'text-rotation-alignment': 'viewport',
      'text-allow-overlap': true,
      'text-max-width': 12
    },
    paint: {
      'text-color': '#ffffff',
      'text-halo-color': '#9b1d6b',
      'text-halo-width': 4,
      'text-halo-blur': 0
    }
  });

  // ============================================================
  // 12. POI MACARONS -- au-dessus de tout
  // ============================================================
  map.addSource('pois', { type:'geojson', data: pointsData, cluster:false });

  map.addLayer({ id:'poi-shadow', type:'circle', source:'pois',
    paint:{ 'circle-radius':16, 'circle-color':'#000000', 'circle-opacity':0.28, 'circle-blur':0.9, 'circle-translate':[2,3] } });

  map.addLayer({ id:'poi-circle', type:'circle', source:'pois',
    paint:{ 'circle-radius':16, 'circle-color': ['get','color'], 'circle-opacity':1, 'circle-stroke-color':'#ffffff', 'circle-stroke-width':3 } });

  // Mapping category (issue du GeoJSON) -> icône de service réelle chargée depuis GitHub
  const CATEGORY_TO_ICON = {
    'restaurant':   'ico-restaurant',
    'binoculars':   'ico-binoculars',
    'bar':          'ico-bar',
    'bakery':       'ico-bakery',
    'exctincteur':  'ico-exctincteur',
    'french-fries': 'ico-french-fries',
    'ticket':       'ico-ticket',
    'wc':           'ico-wc',
    'vip':          'ico-vip',
    'wheelchair':   'ico-wheelchair',
    'pharmacie':    'ico-pharmacie'
  };
  const MAPPED_CATEGORIES = Object.keys(CATEGORY_TO_ICON);

  // Halo blanc sous les icônes de service (icon-halo-* n'existe pas nativement pour icon-image en Mapbox GL,
  // on simule le détachement du sol avec un petit disque blanc en dessous de chaque icône mappée)
  map.addLayer({
    id: 'poi-icon-service-halo', type: 'circle', source: 'pois',
    filter: ['in', ['get','category'], ['literal', MAPPED_CATEGORIES]],
    paint: { 'circle-radius': 11, 'circle-color': '#ffffff', 'circle-opacity': 0.9 }
  });

  // Icône image réelle pour les points dont la "category" est mappée
  map.addLayer({
    id: 'poi-icon-service', type: 'symbol', source: 'pois',
    filter: ['in', ['get','category'], ['literal', MAPPED_CATEGORIES]],
    layout: {
      'icon-image': ['match', ['get','category'],
        'restaurant', 'ico-restaurant',
        'binoculars', 'ico-binoculars',
        'bar', 'ico-bar',
        'bakery', 'ico-bakery',
        'exctincteur', 'ico-exctincteur',
        'french-fries', 'ico-french-fries',
        'ticket', 'ico-ticket',
        'wc', 'ico-wc',
        'vip', 'ico-vip',
        'wheelchair', 'ico-wheelchair',
        'pharmacie', 'ico-pharmacie',
        'ico-wc'
      ],
      'icon-size': 0.05,
      'icon-allow-overlap': true,
      'icon-pitch-alignment': 'viewport',
      'icon-rotation-alignment': 'viewport'
    }
  });

  // Fallback emoji pour tout ce qui n'a pas de category mappée (parkings, médical sans icône, podium...)
  map.addLayer({ id:'poi-icon', type:'symbol', source:'pois',
    filter: ['!', ['in', ['get','category'], ['literal', MAPPED_CATEGORIES]]],
    layout:{ 'text-field': ['get','icon'], 'text-size':16, 'text-allow-overlap':true,
             'text-pitch-alignment':'viewport', 'text-rotation-alignment':'viewport' },
    paint:{ 'text-halo-color':'#ffffff', 'text-halo-width':1.5 } });

  // ============================================================
  // INTERACTIVITE
  // ============================================================
  function poiClick(e) { flyAndPopup(e.features[0].geometry.coordinates, e.features[0].properties); }
  map.on('click', 'poi-circle', poiClick);
  map.on('click', 'poi-icon', poiClick);
  map.on('click', 'poi-icon-service', poiClick);
  ['poi-circle','poi-icon','poi-icon-service'].forEach(id => {
    map.on('mouseenter', id, () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', id, () => { map.getCanvas().style.cursor = ''; });
  });
  map.on('mouseenter', 'poi-circle', () => map.setPaintProperty('poi-circle','circle-radius',18));
  map.on('mouseleave', 'poi-circle', () => map.setPaintProperty('poi-circle','circle-radius',16));

  const clickableLayers = ['track-fill','paddock-fill','village-fill','spectateurs-fill','interdites-fill','parkings-fill','general-fill','zoneactivite-fill','zonedepart-fill'];
  clickableLayers.forEach(id => {
    map.on('click', id, (e) => flyAndPopup(e.lngLat.toArray(), e.features[0].properties));
    map.on('mouseenter', id, () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', id, () => { map.getCanvas().style.cursor = ''; });
  });

  map.on('click', 'paddock-click', (e) => {
    const label = e.features[0].properties.label;
    flyAndPopup(e.lngLat.toArray(), { label: `Paddock — Allée ${label}`, desc:'Espace pilotes — accès paddock' });
  });
  map.on('mouseenter', 'paddock-click', () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', 'paddock-click', () => { map.getCanvas().style.cursor = ''; });

  // ============================================================
  // LEGENDE
  // ============================================================
  const seen = new Set();
  const legendContainer = document.getElementById('legend-items');
  function addLegend(color, icon, label) {
    if (seen.has(label)) return;
    seen.add(label);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-badge" style="background:${color}">${icon||''}</span><span class="legend-label">${label}</span>`;
    legendContainer.appendChild(item);
  }
  addLegend('#5C4033','🏁','Piste de course');
  addLegend('#EAE7DC','','Paddock (Zones A-K)');
  addLegend('#000','🏳️','Zone de départ');
  addLegend('#FF6F3C','🎪','Espace Animation');
  addLegend(villageData.properties.color,'','Village / Espace Animation');
  addLegend('#6fae6f','','Zone Spectateurs');
  addLegend('#E63946','🚫','Zone interdite');
  parkingsData.features.forEach(f => addLegend(f.properties.color, f.properties.icon, f.properties.group));
  generalData.features.forEach(f => addLegend(f.properties.color, f.properties.icon, f.properties.group));

  // Masquer l'écran de chargement une fois tout construit
  document.getElementById('loadingScreen').classList.add('hidden');

} // fin buildMap()
</script>
